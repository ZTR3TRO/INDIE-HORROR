<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIGHTFALL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @font-face {
            font-family: "NightfallFont";
            src: url("assets/fonts/tipografia.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        .nf-title {
            display: flex;
            gap: clamp(1.2rem, 3vw, 2.8rem);
            margin-bottom: 2.8rem;
        }

        .nf-letter {
            font-family: 'NightfallFont', 'Cinzel', serif;
            font-size: clamp(3rem, 7vw, 6rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.15rem;
            opacity: 0;
            animation: letter-emerge 1.6s ease forwards;
            color: #7abf8a;
            text-shadow:
                -1px -1px 0   rgba(0,0,0,0.98),
                 1px -1px 0   rgba(0,0,0,0.98),
                -1px  1px 0   rgba(0,0,0,0.98),
                 1px  1px 0   rgba(0,0,0,0.98),
                 0    2px 5px rgba(0,0,0,0.9),
                 0    5px 14px rgba(0,0,0,0.75),
                 0 0  3px rgba(200,255,210,0.55),
                 0 0 12px rgba(80,160,90,0.55),
                 0 0 28px rgba(90,140,60,0.28),
                 0 0 55px rgba(60,110,40,0.12);
            filter: saturate(0.82) brightness(0.95);
        }

        .nf-letter:nth-child(1) { animation-delay: 0.10s; }
        .nf-letter:nth-child(2) { animation-delay: 0.22s; }
        .nf-letter:nth-child(3) { animation-delay: 0.34s; }
        .nf-letter:nth-child(4) { animation-delay: 0.46s; }
        .nf-letter:nth-child(5) { animation-delay: 0.58s; }
        .nf-letter:nth-child(6) { animation-delay: 0.70s; }
        .nf-letter:nth-child(7) { animation-delay: 0.82s; }
        .nf-letter:nth-child(8) { animation-delay: 0.94s; }
        .nf-letter:nth-child(9) { animation-delay: 1.06s; }

        @keyframes letter-emerge {
            0%   { opacity:0; filter:blur(12px) saturate(0.4); transform:translateY(8px); }
            60%  { opacity:0.8; filter:blur(2px) saturate(0.7); }
            100% { opacity:1; filter:blur(0) saturate(0.82) brightness(0.95); transform:translateY(0); }
        }

        .nf-letter:nth-child(2) {
            animation: letter-emerge 1.6s ease forwards, neon-flicker-dirty 9s step-end infinite;
            animation-delay: 0.22s, 5s;
        }
        .nf-letter:nth-child(7) {
            animation: letter-emerge 1.6s ease forwards, neon-flicker-dirty 13s step-end infinite;
            animation-delay: 0.82s, 7.5s;
        }

        @keyframes neon-flicker-dirty {
            0%,85%,87%,90%,100% { opacity:1; filter:saturate(0.82) brightness(0.95); }
            86%  { opacity:0.05; filter:saturate(0) brightness(0.3); }
            88%  { opacity:0.55; filter:saturate(0.5) brightness(0.7); }
            89%  { opacity:0.2;  filter:saturate(0.2) brightness(0.4); }
        }

        #menu::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 0;
            pointer-events: none;
        }

        .menu-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -12vh;
        }

        #startBtn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0;
            background: transparent !important;
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            outline: none;
            opacity: 0;
            animation: btn-appear 1s ease forwards;
            animation-delay: 1.8s;
        }

        #startBtn::before,
        #startBtn::after { content: none !important; }

        .btn-text {
            font-family: 'NightfallFont', 'Cinzel', serif;
            font-size: clamp(1.1rem, 2.2vw, 1.5rem);
            font-weight: 700;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: #6aaf7a;
            filter: saturate(0.75) brightness(0.9);
            position: relative;
            display: inline-block;
            text-shadow:
                -1px -1px 0   rgba(0,0,0,0.95),
                 1px  1px 0   rgba(0,0,0,0.95),
                 0    2px 6px rgba(0,0,0,0.85),
                 0 0  8px rgba(70,140,80,0.5),
                 0 0 22px rgba(60,110,50,0.22);
            animation: glitch-idle 6s step-end infinite;
            animation-delay: 2.5s;
        }

        .btn-text::before {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            color: rgba(180,60,40,0.7);
            clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
            transform: translateX(-3px);
            opacity: 0;
            animation: glitch-red 6s step-end infinite;
            animation-delay: 2.5s;
            text-shadow: none;
            filter: none;
            letter-spacing: 0.5rem;
        }

        .btn-text::after {
            content: attr(data-text);
            position: absolute;
            inset: 0;
            color: rgba(140,230,150,0.65);
            clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
            transform: translateX(3px);
            opacity: 0;
            animation: glitch-green 6s step-end infinite;
            animation-delay: 2.5s;
            text-shadow: none;
            filter: none;
            letter-spacing: 0.5rem;
        }

        #startBtn:hover .btn-text {
            animation: glitch-hover 0.4s step-end infinite;
            color: #8fd49f;
        }
        #startBtn:hover .btn-text::before {
            animation: glitch-red-hover 0.4s step-end infinite;
            opacity: 1;
        }
        #startBtn:hover .btn-text::after {
            animation: glitch-green-hover 0.4s step-end infinite;
            opacity: 1;
        }

        @keyframes glitch-idle {
            0%,78%,80%,83%,100% {
                transform: none;
                text-shadow:
                    -1px -1px 0 rgba(0,0,0,0.95), 1px 1px 0 rgba(0,0,0,0.95),
                    0 2px 6px rgba(0,0,0,0.85),
                    0 0 8px rgba(70,140,80,0.5), 0 0 22px rgba(60,110,50,0.22);
            }
            79% {
                transform: skewX(-4deg) translateX(2px);
                text-shadow: 3px 0 rgba(180,50,30,0.6), -3px 0 rgba(100,200,120,0.6), 0 0 12px rgba(70,140,80,0.6);
            }
            81% {
                transform: skewX(3deg) translateX(-2px);
                text-shadow: -2px 0 rgba(180,50,30,0.5), 2px 0 rgba(100,200,120,0.5);
            }
            82% { transform: none; }
        }

        @keyframes glitch-red {
            0%,78%,83%,100% { opacity:0; transform:translateX(-3px); }
            79% { opacity:1; transform:translateX(-5px); clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%); }
            80% { opacity:0; }
            81% { opacity:1; transform:translateX(-2px); clip-path:polygon(0 55%,100% 55%,100% 70%,0 70%); }
            82% { opacity:0; }
        }

        @keyframes glitch-green {
            0%,78%,83%,100% { opacity:0; transform:translateX(3px); }
            79% { opacity:1; transform:translateX(5px); clip-path:polygon(0 50%,100% 50%,100% 65%,0 65%); }
            80% { opacity:1; transform:translateX(2px); clip-path:polygon(0 10%,100% 10%,100% 28%,0 28%); }
            82% { opacity:0; }
        }

        @keyframes glitch-hover {
            0%,100% { transform:none; }
            20% { transform:skewX(-6deg) translateX(3px); }
            40% { transform:skewX(4deg) translateX(-3px) scaleY(1.01); }
            60% { transform:translateX(2px) skewX(-2deg); }
            80% { transform:translateX(-2px); }
        }

        @keyframes glitch-red-hover {
            0%   { opacity:1; transform:translateX(-4px); clip-path:polygon(0 0%,100% 0%,100% 30%,0 30%); }
            25%  { opacity:1; transform:translateX(-6px); clip-path:polygon(0 40%,100% 40%,100% 55%,0 55%); }
            50%  { opacity:0; }
            75%  { opacity:1; transform:translateX(-3px); clip-path:polygon(0 65%,100% 65%,100% 80%,0 80%); }
            100% { opacity:1; transform:translateX(-4px); clip-path:polygon(0 10%,100% 10%,100% 25%,0 25%); }
        }

        @keyframes glitch-green-hover {
            0%   { opacity:1; transform:translateX(4px);  clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%); }
            25%  { opacity:0; }
            50%  { opacity:1; transform:translateX(6px);  clip-path:polygon(0 55%,100% 55%,100% 75%,0 75%); }
            75%  { opacity:1; transform:translateX(3px);  clip-path:polygon(0 0%,100% 0%,100% 20%,0 20%); }
            100% { opacity:0; }
        }

        @keyframes btn-appear {
            0%   { opacity:0; transform:translateY(5px); }
            100% { opacity:1; transform:translateY(0); }
        }
    </style>
</head>
<body>
    <div id="menu" class="menu">
        <div class="menu-noise"></div>
        <div class="menu-vignette"></div>
        <div class="scanlines"></div>

        <div class="menu-content">
            <div class="nf-title">
                <span class="nf-letter">N</span>
                <span class="nf-letter">I</span>
                <span class="nf-letter">G</span>
                <span class="nf-letter">H</span>
                <span class="nf-letter">T</span>
                <span class="nf-letter">F</span>
                <span class="nf-letter">A</span>
                <span class="nf-letter">L</span>
                <span class="nf-letter">L</span>
            </div>
            <button id="startBtn">
                <span class="btn-text" data-text="COMENZAR">COMENZAR</span>
            </button>
        </div>
    </div>

    <div id="crosshair"></div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
